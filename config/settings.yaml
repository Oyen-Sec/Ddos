# =============================================================================
# Multi-Protocol Concurrency Layer v6.0 - Full Settings
# =============================================================================

# ---- Proxy Settings ----
proxy:
  connect_timeout: 3
  min_pool: 5
  health_check_interval: 60
  max_fail: 3
  # FlareSolverr validation: proxies that pass get "premium" tier
  flaresolverr_validation: false
  # TLS fingerprint rotation per proxy type
  tls_rotation:
    mobile: "chrome126"
    residential: "firefox130"
    datacenter: "round_robin"
    premium: "safari17.4"

# ---- Target Settings ----
target:
  default_protocol: "https"
  default_method: "auto"
  max_redirects: 5
  follow_redirects: true

# ---- Attack Settings ----
attack:
  default_duration: 3600
  default_method: "http_get_flood"
  max_rps: 50000
  min_rps: 100
  initial_rps: 5000
  # Adaptive thresholds
  adaptive:
    error_threshold: 15
    timeout_threshold: 10
    rps_increase_factor: 1.3
    rps_decrease_factor: 0.5
  # Smart attack adaptation window (seconds)
  adaptation_window: 30
  # WAF bypass probing interval (requests)
  waf_probe_interval: 100

# ---- HTTP/2 Impersonation Settings ----
http2:
  enabled: true
  default_profile: "chrome126"
  profiles:
    - "chrome126"
    - "firefox130"
    - "edge126"
    - "safari17.4"
  # Rotate profile every N requests (0 = no rotation)
  profile_rotation: 50

# ---- WAF Parsing Bypass Settings ----
waf_bypass:
  enabled: true
  # Auto-fuzz target before attack to find working methods
  auto_probe: true
  # Number of methods to test during probe
  probe_methods: 10
  # Only use methods with effectiveness >= threshold
  effectiveness_threshold: 0.5

# ---- Behavioral Evasion Settings ----
behavioral:
  enabled: true
  # Browser automation mode: "nodriver", "playwright", "none"
  browser_mode: "nodriver"
  # Browser pool settings
  browser_pool:
    max_concurrent: 10
    recycle_after: 1000
    session_ttl: 600
  # Markov timing parameters
  timing:
    base_interval: 0.05
    max_interval: 5.0
  # Template for session behavior
  default_template: "casual_browser"

# ---- FlareSolverr Settings ----
flaresolverr:
  enabled: true
  endpoint: "http://localhost:8191"
  timeout: 30
  max_retries: 3
  backoff_base: 2.0
  # Auto-start FlareSolverr via Docker if not running
  auto_start: true
  docker_compose_path: "docker-compose.yml"

# ---- Origin Discovery Settings ----
origin_discovery:
  enabled: true
  timeout: 8
  max_concurrent: 200
  # Enable WAF-bypass discovery methods
  waf_bypass:
    health_endpoints: true
    acme_validation: true
    xforwarded_bypass: true
    cdn_misconfig: true

# ---- Logging Settings ----
logging:
  level: "WARNING"
  file: "logs/mpc_layer.log"
  max_size_mb: 100
  backup_count: 5

# ---- Dashboard Settings ----
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  refresh_interval: 1.0

# ---- Session Pool Settings ----
session_pool:
  enabled: true
  max_sessions: 100
  cookie_db: "cookies/sessions.db"
  cleanup_interval: 300
